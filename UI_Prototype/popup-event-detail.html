<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyToGoKorea - K-POP 랜덤 댄스</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .event-cover {
            height: 200px;
            background: linear-gradient(135deg, #FF9A9E, #FECFEF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 -24px 24px -24px;
        }
        .event-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; color: var(--text-primary); line-height: 1.3; }
        .event-meta { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .event-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .event-desc { font-size: 15px; line-height: 1.6; color: var(--text-secondary); margin-bottom: 24px; }
        .event-stat { font-weight: 700; color: #ff4757; font-size: 15px; margin-bottom: 24px; }
        .event-actions { display: flex; flex-direction: column; gap: 12px; }
        .event-actions .pill-btn { justify-content: center; }
    </style>
</head>

<body>
    <div class="mobile-frame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons">
                <span class="icon">📶</span>
                <span class="icon">🔋</span>
            </div>
        </div>

        <div class="app-content">
            <header class="header">
                <button class="icon-btn" onclick="history.back()">←</button>
                <div class="header-center">
                    <span class="subtitle">팝업 이벤트</span>
                    <h2 class="header-title">이벤트 상세</h2>
                </div>
                <div style="width: 44px;"></div>
            </header>

            <div class="event-cover">🌉💃</div>

            <h1 class="event-title">K-POP 랜덤 댄스 @ 한강공원 물빛무대</h1>

            <div class="event-meta">
                <span>🕐 오늘 오후 5시</span>
                <span>📍 한강공원 물빛무대</span>
            </div>

            <p class="event-desc">오늘 오후 5시! 야외 무대에서 글로벌 K-POP 팬들과 함께 뛰어놀아요! ✨ (우천 시 취소)</p>

            <p class="event-stat">🔥 5.8k 참여 대기 중</p>

            <div class="event-actions">
                <button class="pill-btn primary full-width" onclick="location.href='map.html'">
                    🗺️ 지도에서 위치 보기
                </button>
                <button class="pill-btn mild full-width" onclick="location.href='planner.html'">
                    ➕ 일정에 추가
                </button>
            </div>
        </div>
    </div>
</body>

</html>
