<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyToGoKorea - Group Pay Settlement</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f7;
            /* iOS-like light gray background */
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .bottom-sheet {
            width: 100%;
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 32px 24px 40px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #E5E5EA;
            border-radius: 3px;
            margin: -20px auto 20px;
        }

        .receipt-card {
            background: #FFFDF8;
            border: 1px dashed #E5E5EA;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
        }

        .receipt-card::before,
        .receipt-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            border: 1px dashed #E5E5EA;
        }

        .receipt-card::before {
            left: -10px;
            border-right: none;
        }

        .receipt-card::after {
            right: -10px;
            border-left: none;
        }


        .receipt-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #E5E5EA;
        }

        .receipt-header h2 {
            margin: 0;
            font-size: 24px;
            color: #1A1A1D;
            font-weight: 800;
        }

        .receipt-header p {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .party-members {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .party-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
            margin-left: -10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .party-avatar:first-child {
            margin-left: 0;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 16px;
            color: #333;
        }

        .price-row.total {
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #E5E5EA;
        }

        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #F4F5F7;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .method-icon {
            width: 40px;
            height: 30px;
            background: #1A1A1D;
            color: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
        }

        .pay-btn-container {
            position: sticky;
            bottom: 32px;
            left: 24px;
            right: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="mobile-frame" style="position: relative;">

        <!-- Map Background Simulated -->
        <div
            style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; background: #EAF1F3; overflow: hidden;">
            <div
                style="position: absolute; top: 15%; left: 10%; width: 300px; height: 300px; background: rgba(0,0,0,0.03); border-radius: 50%;">
            </div>
            <div
                style="position: absolute; bottom: 10%; right: -20%; width: 400px; height: 400px; background: rgba(0,0,0,0.02); border-radius: 50%;">
            </div>
        </div>

        <div class="status-bar transparent" style="position: relative; z-index: 10;">
            <span style="color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5);">9:41</span>
            <div class="icons" style="color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5);">
                <span class="icon">📶</span>
                <span class="icon">🔋</span>
            </div>
        </div>

        <button class="icon-btn clear"
            style="position:absolute; top: 50px; left: 20px; z-index: 101; background:rgba(255,255,255,0.2); color:white; border-radius: 50%;"
            onclick="history.back()">✕</button>

        <!-- Bottom Sheet Modal (항상 열린 상태로 표시) -->
        <div class="modal-overlay active">
            <div class="bottom-sheet">
                <div class="sheet-handle"></div>

                <div style="text-align: center; margin-bottom: 24px;">
                    <div style="font-size: 40px; margin-bottom: 8px;">🤝</div>
                    <h1 style="font-size: 22px; font-weight: 800; margin: 0; color: #1A1A1D;">파티 더치페이 (1/N)</h1>
                    <p style="color: var(--text-secondary); margin: 4px 0 0; font-size: 15px;">John님이 명동교자 본점 결제를
                        완료했습니다.</p>
                </div>

                <div class="party-members">
                    <div class="party-avatar" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);">😎
                    </div>
                    <div class="party-avatar" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);">😊
                    </div>
                    <div class="party-avatar" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">🌸
                    </div>
                </div>

                <div class="receipt-card">
                    <div class="receipt-header">
                        <h2>명동교자 본점</h2>
                        <p>2026.03.01 12:30 PM</p>
                    </div>

                    <div class="price-row">
                        <span>총 결제 금액</span>
                        <span>₩ 36,000</span>
                    </div>
                    <div class="price-row" style="color: var(--text-secondary); font-size: 14px;">
                        <span>참여 인원</span>
                        <span>3 명</span>
                    </div>

                    <div class="price-row total">
                        <span>나의 정산 금액</span>
                        <span>₩ 12,000</span>
                    </div>
                    <div style="text-align: right; color: var(--text-secondary); font-size: 12px; margin-top: -8px;">
                        (~ $8.45 USD)
                    </div>
                </div>

                <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #1A1A1D;">정산 방법</h3>
                <div class="payment-method">
                    <div class="method-icon">VISA</div>
                    <div style="flex:1;">
                        <div style="font-weight: 600; font-size: 15px; color:#1A1A1D;">내 지갑 (Wallet)</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">Visa ending in 4242</div>
                    </div>
                    <div style="color: var(--accent); font-weight: 700; cursor:pointer;">변경</div>
                </div>

                <div class="pay-btn-container">
                    <button class="pill-btn full-width" onclick="alert('정산이 완료되었습니다!'); history.back();">₩12,000
                        정산하기</button>
                    <div style="text-align: center; margin-top: 12px;">
                        <button
                            style="background:none; border:none; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor:pointer;"
                            onclick="history.back()">나중에 하기</button>
                    </div>
                </div>

            </div>
        </div>

    </div>
</body>

</html>
