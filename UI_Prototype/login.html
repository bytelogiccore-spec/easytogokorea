<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyToGoKorea - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .auth-logo {
            width: 80px;
            margin-bottom: 24px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            border-radius: 16px;
            border: 1px solid #E5E5EA;
            background: #F9F9F9;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 112, 67, 0.1);
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 13px;
        }

        .auth-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link:hover {
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 112, 67, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 32px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 32px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E5E5EA;
        }

        .divider::before {
            margin-right: 16px;
        }

        .divider::after {
            margin-left: 16px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .social-btn:active {
            transform: scale(0.98);
        }

        .btn-google {
            background: white;
            border: 1px solid #E5E5EA;
            color: #1C1C1E;
        }

        .btn-apple {
            background: #000000;
            border: none;
            color: white;
        }

        .btn-microsoft {
            background: white;
            border: 1px solid #E5E5EA;
            color: #5E5E5E;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* SVG Logos */
        .svg-icon {
            width: 100%;
            height: 100%;
        }

        .bottom-link {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .bottom-link a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
        }
    </style>
</head>

<body>
    <div class="mobile-frame">
        <div class="status-bar transparent" style="color:#1C1C1E;">
            <span>9:41</span>
            <div class="icons">
                <span class="icon">📶</span>
                <span class="icon">🔋</span>
            </div>
        </div>

        <div class="app-content auth-container">
            <div class="auth-header">
                <img src="logo.png" alt="Logo" class="auth-logo"
                    onerror="this.outerHTML='<div style=\'font-size:50px; margin-bottom:16px;\'>🗺️</div>'">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Log in to continue your journey</p>
            </div>

            <form action="index.html" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div class="input-group">
                    <input type="email" class="input-field" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" class="input-field" placeholder="Password" required>
                </div>

                <div class="auth-options">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" style="accent-color: var(--accent); width:16px; height:16px;">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="auth-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="divider">Or continue with</div>

            <button class="social-btn btn-google" onclick="window.location.href='index.html'">
                <div class="social-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                </div>
                Continue with Google
            </button>

            <button class="social-btn btn-apple" onclick="window.location.href='index.html'">
                <div class="social-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
                        <path
                            d="M16.365 7.027c-.015-2.31 1.888-3.419 1.97-3.468-1.077-1.571-2.75-1.789-3.342-1.815-1.423-.143-2.783.842-3.511.842-.729 0-1.838-.824-3.003-.8C6.9 1.808 5.485 2.607 4.6 3.978c-1.791 2.56-1.042 6.843.722 9.38 1.054 1.517 2.306 3.235 3.948 3.171 1.583-.064 2.18-.941 4.102-.941 1.92 0 2.477.941 4.12.91 1.68-.032 2.768-1.517 3.82-3.045 1.217-1.77 1.718-3.483 1.741-3.572-.038-.016-3.35-1.282-3.364-5.127M14.922 4.095c.879-1.06 1.47-2.535 1.309-4.008-1.265.05-2.8.84-3.7 1.902-.8.95-1.455 2.454-1.272 3.899 1.42.11 2.808-.711 3.663-1.793" />
                    </svg>
                </div>
                Continue with Apple
            </button>

            <button class="social-btn btn-microsoft" onclick="window.location.href='index.html'">
                <div class="social-icon">
                    <svg class="svg-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#f35325" d="M1 1h10v10H1z" />
                        <path fill="#81bc06" d="M12 1h10v10H12z" />
                        <path fill="#05a6f0" d="M1 12h10v10H1z" />
                        <path fill="#ffba08" d="M12 12h10v10H12z" />
                    </svg>
                </div>
                Continue with Microsoft
            </button>

            <div class="bottom-link">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>

    </div>
</body>

</html>
