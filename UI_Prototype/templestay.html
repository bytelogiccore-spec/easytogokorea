<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyToGoKorea - Templestay</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="mobile-frame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons">
                <span class="icon">📶</span>
                <span class="icon">🔋</span>
            </div>
        </div>

        <div class="app-content templestay-content">
            <header class="header">
                <button class="icon-btn" onclick="history.back()">←</button>
                <div class="header-center">
                    <h2 class="header-title">템플스테이 예약</h2>
                </div>
                <div class="header-right" style="width: 44px;"></div>
            </header>

            <div class="stepper-section">
                <h3 class="step-title">1. 테마를 선택하세요 (스와이프)</h3>
                <div class="theme-carousel">
                    <div class="theme-card active">
                        <div class="theme-icon">🧘</div>
                        <h4>명상 중심: 참선, 108배</h4>
                        <p>해인사 (경상남도 합천군)</p>
                    </div>
                </div>
            </div>

            <div class="stepper-section mt-24">
                <h3 class="step-title">2. 날짜와 인원을 확인하세요</h3>

                <div class="selection-box">
                    <div class="selection-item">
                        <span class="icon">📅</span>
                        <span>10.25 - 10.26 / 1박 2일</span>
                        <span class="chevron">⌵</span>
                    </div>
                    <div class="divider"></div>
                    <div class="selection-item">
                        <span class="icon">👥</span>
                        <span>성인 2명</span>
                        <span class="chevron">⌵</span>
                    </div>
                </div>
            </div>

            <div class="stepper-section mt-24">
                <h3 class="step-title">3. 총 결제 금액</h3>
                <div class="total-price">₩ 140,000</div>
            </div>

            <div class="bottom-fixed-actions">
                <button class="pill-btn full-width primary" id="payBtn">
                    💳 등록된 Visa 카드로 결제 (지문)
                </button>
            </div>

            <!-- Success Overlay -->
            <div class="overlay hidden" id="successPopup">
                <div class="tip-card card text-center">
                    <div class="success-icon">✨</div>
                    <h2 class="tip-title">예약이 완료되었습니다!</h2>
                    <p class="tip-subtitle">해인사에서의 평온한 주말을 기대해주세요.</p>
                    <button class="pill-btn full-width primary mt-16" onclick="location.href='index.html'">홈으로
                        돌아가기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('payBtn').addEventListener('click', function () {
            document.getElementById('successPopup').classList.remove('hidden');
        });
    </script>
</body>

</html>
