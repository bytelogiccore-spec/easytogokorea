<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Zen Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .map-grid {
            background-color: #000;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="map-grid text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col justify-between shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Header -->
        <header class="p-8 z-10 flex justify-between items-center">
            <button class="text-4xl font-bold">&larr;</button>
        </header>

        <!-- Simulated "Zen" Route -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <!-- Starting Dot -->
            <div
                class="absolute bottom-1/4 left-1/4 w-6 h-6 bg-white rounded-full border-4 border-black shadow-[0_0_20px_white]">
            </div>

            <!-- Thick Glowing Line -->
            <svg class="absolute inset-0 w-full h-full" viewBox="0 0 400 850">
                <path d="M 100,630 C 100,400 300,500 250,250" fill="none" class="stroke-blue-600" stroke-width="12"
                    stroke-linecap="round" style="filter: drop-shadow(0 0 15px rgba(37,99,235,0.8));" />
            </svg>

            <!-- Destination Pin -->
            <div
                class="absolute top-[28%] right-[32%] w-8 h-8 bg-blue-600 rounded-full border-4 border-black shadow-[0_0_20px_rgba(37,99,235,1)] flex items-center justify-center">
                <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
            <p class="absolute top-[23%] right-[20%] text-2xl font-black text-white drop-shadow-lg">Gyeongbokgung</p>
        </div>

        <!-- Giant Bottom Overlay -->
        <footer class="z-10 bg-black/80 backdrop-blur-md w-full p-8 rounded-t-3xl pb-10">
            <p class="text-gray-400 font-bold tracking-widest text-sm uppercase mb-2">Walk Mode</p>
            <div class="flex items-end justify-between">
                <h1 class="text-6xl font-black tracking-tighter">15 MIN</h1>
                <p class="text-3xl font-bold text-blue-500">1.2km</p>
            </div>

            <!-- Swipe to change mode hint -->
            <div class="mt-8 flex justify-center w-full">
                <div class="w-16 h-1 bg-gray-600 rounded-full"></div>
            </div>
            <p class="text-center text-gray-500 font-bold text-xs uppercase tracking-widest mt-2">Swipe for Transit</p>
        </footer>

    </div>
</body>

</html>
