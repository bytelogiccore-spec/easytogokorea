<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - AR Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #111;
        }

        /* Simulating camera view */
        .camera-bg {
            background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1540331547168-8b63109225b7?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="camera-bg text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col justify-between shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Top nav -->
        <header class="p-8">
            <button class="text-4xl font-bold saturate-0">&larr;</button>
        </header>

        <!-- AR Element Center -->
        <main class="flex-1 flex flex-col items-center justify-center p-8 text-center pb-32">
            <h2 class="text-5xl font-black drop-shadow-2xl">150m</h2>
            <div class="text-9xl font-black text-blue-500 mt-4 drop-shadow-[0_0_30px_rgba(59,130,246,0.8)]">&uarr;</div>
        </main>

        <!-- Bottom Sheet (Minimal text block) -->
        <footer class="absolute bottom-0 w-full p-8 bg-black/80 backdrop-blur-md">
            <h1 class="text-4xl font-black mb-1">Hongdae Stn.</h1>
            <p class="text-xl font-bold text-gray-400">2 min walk</p>
        </footer>

    </div>
</body>

</html>
