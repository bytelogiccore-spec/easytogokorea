<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - AR Graffiti Write</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inconsolata', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        .neon-scribble {
            color: transparent;
            -webkit-text-stroke: 4px #0ea5e9;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.8), 0 0 40px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="bg-black text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col justify-between shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden cursor-crosshair">

        <!-- Header -->
        <header class="p-8 z-10 flex justify-between items-center">
            <button class="text-3xl">&times;</button>
            <!-- No other UI -->
        </header>

        <!-- Black Canvas -->
        <main class="flex-1 flex items-center justify-center relative">
            <!-- Simulated User scribble (using code font for brutalist look) -->
            <h1
                class="text-[8rem] font-black transform -rotate-6 neon-scribble leading-none tracking-tighter mix-blend-screen text-center">
                Hello<br>SEOUL</h1>

            <!-- Drawing hint -->
            <p class="absolute bottom-1/4 text-gray-600 text-sm font-bold tracking-[0.3em] uppercase opacity-50">Draw
                Anywhere</p>
        </main>

        <!-- Footer / Action -->
        <footer class="w-full text-center pb-12 flex flex-col items-center gap-4">
            <div class="w-8 h-12 border-2 border-white/30 rounded-full flex justify-center items-start pt-2">
                <div class="w-1 h-3 bg-white rounded-full animate-bounce"></div>
            </div>
            <h2 class="text-3xl font-black uppercase tracking-widest text-blue-500">Swipe Up</h2>
            <p class="text-xs uppercase tracking-[0.4em] text-gray-500 font-bold mt-1">To drop into reality</p>
        </footer>

    </div>
</body>

</html>
