<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Multi AR Graffiti View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .camera-bg-street {
            background-image:
                linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.6)),
                url('https://images.unsplash.com/photo-1596765100613-58ebfca08537?auto=format&fit=crop&q=80');
            /* Cafe street vibe */
            background-size: cover;
            background-position: center;
        }

        /* Various neon text layers */
        .neon-pink {
            text-shadow: 0 0 10px #ff007f, 0 0 30px #ff007f, 0 0 60px #ff007f;
        }

        .neon-blue {
            text-shadow: 0 0 10px #0ea5e9, 0 0 30px #0ea5e9, 0 0 60px #0ea5e9;
        }

        .neon-yellow {
            text-shadow: 0 0 10px #eab308, 0 0 30px #eab308;
        }

        /* Simulating 3D float */
        .perspective-container {
            perspective: 800px;
            transform-style: preserve-3d;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="camera-bg-street text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden perspective-container">

        <!-- Header -->
        <header class="absolute top-0 w-full p-8 z-50 flex justify-between items-center">
            <button class="text-4xl font-bold drop-shadow-lg">&larr;</button>
            <div class="flex gap-2">
                <span class="w-3 h-3 bg-white rounded-full"></span>
                <span class="w-3 h-3 bg-white/40 rounded-full"></span>
                <span class="w-3 h-3 bg-white/40 rounded-full"></span>
            </div>
        </header>

        <!-- Main AR Space (Z-indexed elements to simulate depth) -->

        <!-- Graffiti 1: Back layer (Small, far away) -->
        <div class="absolute top-[20%] right-[-10%] transform rotate-12 rotateX-12 scale-75 blur-[1px] opacity-60">
            <h2
                class="text-4xl font-black text-transparent -webkit-text-stroke-2 -webkit-text-stroke-white neon-yellow tracking-tighter">
                Must Try!<br>Matcha</h2>
        </div>

        <!-- Graffiti 2: Mid layer (Left side) -->
        <div class="absolute top-[35%] left-[5%] transform -rotate-6 rotateY-[20deg]">
            <h2 class="text-5xl font-black text-white neon-blue leading-none italic">VIBE<br>CHECK ☕</h2>
            <!-- Micro interaction/like counter anchor -->
            <div
                class="mt-2 flex items-center gap-2 bg-black/40 backdrop-blur-md px-3 py-1 rounded-full w-max border border-white/20">
                <span class="text-xs font-bold text-gray-300">♥ 1.2k</span>
            </div>
        </div>

        <!-- Graffiti 3: Fore layer (Right in front / Focus) -->
        <div class="absolute top-[50%] left-[15%] transform rotate-[-2deg] scale-110 z-20">
            <h1 class="text-7xl font-black leading-none text-white neon-pink tracking-tighter">JMT !! 💕</h1>
            <p class="text-xl font-bold mt-1 drop-shadow-md">Insane Bagels</p>

            <!-- Instagram Link Anchor (Brutalist Pill) -->
            <a href="#"
                class="mt-4 flex items-center gap-2 bg-white text-black px-4 py-2 rounded-full w-max shadow-xl hover:scale-105 active:scale-95 transition-transform group">
                <!-- Simple SVG Insta Icon -->
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" w="20" h="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
                <span class="text-sm font-black tracking-widest lowercase">@foodie_jane</span>
            </a>
        </div>

        <!-- Bottom UI Action -->
        <footer class="absolute bottom-0 w-full p-8 pb-12 z-50 flex justify-center">
            <!-- Brutal Draw Button -->
            <button
                class="bg-black/80 backdrop-blur-lg border border-white/20 text-white text-xl font-black tracking-widest uppercase px-12 py-5 rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-center gap-3">
                <span class="text-3xl leading-none">+</span>
                <span>Draw</span>
            </button>
        </footer>

    </div>
</body>

</html>
