<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - AR Graffiti View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .camera-bg {
            background-image:
                linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.8)),
                url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }

        .neon-text {
            text-shadow:
                0 0 5px #ff00ff,
                0 0 15px #ff00ff,
                0 0 30px #ff00ff,
                0 0 50px #ff00ff;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="camera-bg text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col justify-between shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Header -->
        <header class="p-8 z-10 flex justify-between items-center">
            <button class="text-4xl font-bold">&larr;</button>
            <button
                class="text-xs font-bold uppercase tracking-widest bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm">Leave
                Mark</button>
        </header>

        <!-- Curated AR Graffiti Space (Only 1 item shows) -->
        <main class="flex-1 flex flex-col items-center justify-center p-8 relative">
            <div class="transform -rotate-12 scale-110 translate-y-[-2rem]">
                <h1 class="text-[5rem] font-black leading-none text-white neon-text text-center italic">BEST<br>LATTE!
                </h1>
            </div>

            <!-- Context anchor (Small) -->
            <div class="absolute bottom-1/4 flex flex-col items-center opacity-70">
                <div class="w-1 h-12 bg-gradient-to-t from-white/0 to-white/50 mb-2"></div>
                <div class="w-16 h-4 border-2 border-white/30 rounded-full transform perspective-100 rotateX-60"></div>
                <p class="text-[10px] font-bold tracking-widest uppercase mt-4">Anchored: Cafe Onion</p>
            </div>
        </main>

        <!-- Minimal Swipe indicator -->
        <footer class="p-8 pb-12 w-full flex justify-between items-center text-gray-400">
            <span class="text-2xl">&larr;</span>
            <span class="text-xs font-bold uppercase tracking-widest text-white">1 of 12</span>
            <span class="text-2xl text-white">&rarr;</span>
        </footer>

    </div>
</body>

</html>
