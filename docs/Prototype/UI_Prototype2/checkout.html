<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide radio button purely visually, use checked state on sibling */
        input[type="radio"]:checked+label {
            color: white;
            background-color: black;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="bg-white text-black h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col justify-between shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden p-8">

        <!-- Top nav -->
        <header class="flex justify-between items-center">
            <button class="text-3xl font-bold">&larr;</button>
            <span class="text-sm font-bold uppercase tracking-widest text-gray-400">Checkout</span>
        </header>

        <!-- Huge Price -->
        <main class="flex-1 flex flex-col justify-center">
            <p class="text-gray-400 font-bold uppercase tracking-widest text-sm mb-4">Total</p>
            <h1 class="text-7xl font-black tracking-tighter">$1,250</h1>

            <!-- Payment Methods as giant text blocks -->
            <div class="mt-16 flex flex-col gap-4">
                <div class="relative">
                    <input type="radio" name="payment" id="zeropay" class="peer sr-only" checked>
                    <label for="zeropay"
                        class="block w-full text-4xl font-bold cursor-pointer transition-colors peer-checked:text-blue-600">ZeroPay</label>
                </div>
                <div class="relative">
                    <input type="radio" name="payment" id="card" class="peer sr-only">
                    <label for="card"
                        class="block w-full text-4xl font-bold cursor-pointer transition-colors text-gray-300 peer-checked:text-black">Card</label>
                </div>
                <div class="relative">
                    <input type="radio" name="payment" id="wowpass" class="peer sr-only">
                    <label for="wowpass"
                        class="block w-full text-4xl font-bold cursor-pointer transition-colors text-gray-300 peer-checked:text-black">WOWPASS</label>
                </div>
            </div>
        </main>

        <!-- Pay Button -->
        <footer class="w-full">
            <button
                class="w-full bg-blue-600 text-white font-black text-3xl py-6 rounded-none hover:bg-black transition-colors">PAY
                &rarr;</button>
        </footer>

    </div>
</body>

</html>
