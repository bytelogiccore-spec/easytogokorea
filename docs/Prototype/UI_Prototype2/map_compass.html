<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Compass Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="bg-blue-600 text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col justify-between shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Header -->
        <header class="p-8 z-10">
            <button class="text-4xl font-bold hover:opacity-75 transition-opacity">&larr;</button>
        </header>

        <!-- Giant Compass View -->
        <main class="flex-1 flex flex-col items-center justify-center">
            <h1 class="text-9xl font-black mb-8 transform -rotate-45 drop-shadow-2xl">&uarr;</h1>

            <div class="text-center mt-12">
                <p class="text-blue-200 font-bold uppercase tracking-widest text-lg mb-2">Straight Ahead</p>
                <h2 class="text-7xl font-black tracking-tighter">400m</h2>
            </div>
        </main>

        <!-- Footer -->
        <footer class="p-8 pb-12 flex justify-between items-end border-t border-blue-500 pt-8">
            <div>
                <p class="text-blue-200 font-bold text-sm uppercase tracking-widest">Destination</p>
                <h3 class="text-3xl font-black tracking-tight mt-1">Hongdae Stn.</h3>
            </div>
            <!-- Toggle to Map -->
            <button
                class="text-sm font-bold bg-white text-blue-600 px-4 py-2 rounded-full uppercase tracking-widest">Map</button>
        </footer>

    </div>
</body>

</html>
