<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="bg-black text-white h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Top nav (Just a back arrow) -->
        <header class="p-8">
            <button class="text-4xl font-bold">&larr;</button>
        </header>

        <!-- Main Scanner Area -->
        <main class="flex-1 flex flex-col items-center justify-center px-8">
            <!-- Frame -->
            <div class="w-full aspect-square border-2 border-white/30 rounded-3xl relative">
                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-3xl"></div>
                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-3xl"></div>
                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-3xl"></div>
                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-3xl"></div>
            </div>

            <h2 class="text-3xl font-bold mt-12 tracking-tight text-center">Scan Menu</h2>
            <p class="text-gray-400 mt-2">Point at Korean text</p>
        </main>

        <!-- Flashlight (Text only) -->
        <footer class="p-12 flex justify-center">
            <button
                class="text-lg font-bold tracking-widest uppercase border-b-2 border-transparent hover:border-white pb-1">Flash
                On</button>
        </footer>

    </div>
</body>

</html>
