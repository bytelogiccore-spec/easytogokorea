<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="bg-white text-black h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col items-center justify-center shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Center Massive Content -->
        <div class="flex flex-col items-center justify-center w-full px-8 gap-12">
            <!-- Minimalist Logo/Greet -->
            <h1 class="text-6xl font-black tracking-tighter">EasyToGo.</h1>

            <!-- Brutal Search Line -->
            <div class="w-full relative">
                <input type="text" placeholder="Search or Scan"
                    class="w-full text-3xl font-bold placeholder-gray-300 border-b-4 border-black pb-2 focus:outline-none bg-transparent" />
                <div class="absolute right-0 bottom-3 w-6 h-6 bg-black rounded-full"></div>
            </div>

            <!-- Text-only Quick Links -->
            <div class="flex flex-col gap-6 items-start w-full mt-4">
                <button class="text-4xl font-bold text-gray-400 hover:text-black transition-colors">Restaurants
                    &rarr;</button>
                <button class="text-4xl font-bold text-gray-400 hover:text-black transition-colors">Transit
                    &rarr;</button>
                <button class="text-4xl font-bold text-gray-400 hover:text-black transition-colors">Medical
                    &rarr;</button>
            </div>
        </div>

        <!-- Extremely Minimal Nav -->
        <nav class="absolute bottom-10 flex gap-8">
            <div class="w-2 h-2 bg-blue-600 rounded-full"></div>
            <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
            <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
        </nav>

    </div>
</body>

</html>
