<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyToGo - Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* A brutalist table-like grid where borders are full black */
        .brutal-border {
            border-bottom: 6px solid black;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <!-- Mobile Device Simulator Container -->
    <div
        class="bg-white text-black h-[100dvh] max-h-[850px] w-full max-w-[400px] relative flex flex-col shadow-2xl rounded-[3rem] border-[8px] border-gray-900 ring-1 ring-gray-200 overflow-hidden">

        <!-- Header -->
        <header class="p-8 pb-4 z-10 flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <button class="text-4xl font-bold">&larr;</button>
                <button class="w-12 h-12 bg-black text-white rounded-full flex justify-center items-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <line x1="4" y1="21" x2="4" y2="14"></line>
                        <line x1="4" y1="10" x2="4" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="3"></line>
                        <line x1="20" y1="21" x2="20" y2="16"></line>
                        <line x1="20" y1="12" x2="20" y2="3"></line>
                        <line x1="1" y1="14" x2="7" y2="14"></line>
                        <line x1="9" y1="8" x2="15" y2="8"></line>
                        <line x1="17" y1="16" x2="23" y2="16"></line>
                    </svg>
                </button>
            </div>

            <h1 class="text-6xl font-black tracking-tighter leading-none">MEDICAL</h1>

            <!-- Minimal filter tags (horizontal scroll) -->
            <div class="flex gap-4 overflow-x-auto hide-scroll pb-2">
                <button class="px-6 py-2 bg-black text-white rounded-full font-bold text-lg whitespace-nowrap">Skin
                    Care</button>
                <button
                    class="px-6 py-2 border-2 border-gray-300 text-gray-400 rounded-full font-bold text-lg whitespace-nowrap hover:border-black hover:text-black transition-colors">Dental</button>
                <button
                    class="px-6 py-2 border-2 border-gray-300 text-gray-400 rounded-full font-bold text-lg whitespace-nowrap hover:border-black hover:text-black transition-colors">Vision</button>
            </div>
        </header>

        <!-- Product List (Magazine/Brutalist Style) -->
        <main class="flex-1 overflow-y-auto px-8 flex flex-col">

            <!-- Item 1 (Highlighted/Recommended) -->
            <div class="brutal-border py-8 group cursor-pointer">
                <!-- Image or pure abstract representation -->
                <div class="w-full h-32 bg-blue-600 mb-6 flex items-end p-4">
                    <span class="text-white font-black text-4xl">#1</span>
                </div>

                <h2
                    class="text-4xl font-black leading-none tracking-tight mb-4 group-hover:text-blue-600 transition-colors">
                    Dream Plastic Surgery</h2>

                <!-- Comparison Data (No tables, just giant numbers) -->
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-1">Botox (100u)</p>
                        <p class="text-5xl font-black tracking-tighter">$120</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold">4.9 ★</p>
                        <p class="text-sm font-bold text-blue-600 mt-1">EN / JP</p>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="brutal-border py-8 group cursor-pointer opacity-80 hover:opacity-100 transition-opacity">
                <h2 class="text-4xl font-black leading-none tracking-tight mb-4 group-hover:text-black">Seoul Beauty
                    Clinic</h2>

                <!-- Comparison Data -->
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-1">Botox (100u)</p>
                        <p class="text-5xl font-black tracking-tighter">$145</p> <!-- Contrast: Not highlighted -->
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold">4.7 ★</p>
                        <p class="text-sm font-bold text-gray-400 mt-1">EN</p>
                    </div>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="brutal-border py-8 group cursor-pointer opacity-80 hover:opacity-100 transition-opacity">
                <h2 class="text-4xl font-black leading-none tracking-tight mb-4 group-hover:text-black">Gangnam Glow
                </h2>

                <!-- Comparison Data -->
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-1">Botox (100u)</p>
                        <p class="text-5xl font-black tracking-tighter text-blue-600">$99</p> <!-- Price Highlight -->
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold">4.5 ★</p>
                        <p class="text-sm font-bold text-gray-400 mt-1">EN / CN</p>
                    </div>
                </div>
            </div>

            <div class="h-12"></div> <!-- Scroll margin -->
        </main>
    </div>
</body>

</html>
