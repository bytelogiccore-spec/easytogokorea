<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyToGoKorea - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Sample6 스타일: 다크 퍼플/블루, 둥근 카드, 글로우 액센트 */
        .search-page.mobile-frame {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .search-page .status-bar {
            color: rgba(255, 255, 255, 0.9);
        }
        .search-page .top-bar {
            padding: 16px 24px;
            flex-shrink: 0;
            background: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .search-page .header-left { display: flex; align-items: center; gap: 12px; }
        .search-page .header-info { display: flex; flex-direction: column; gap: 4px; }
        .search-page .header-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .search-page .top-bar h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            margin: 0;
        }
        .search-page .top-bar .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: none;
        }
        .search-page .top-bar .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            margin: 0;
        }

        .search-page .gesture-nav-container {
            bottom: 72px;
            height: 80px;
            padding-bottom: 0;
        }
        .search-page .chat-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        .search-page .chat-scroll::-webkit-scrollbar { width: 6px; }
        .search-page .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }

        .search-page .chat-container {
            padding: 20px 24px 180px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 100%;
            min-width: 0;
        }

        /* 환영 문구 (버블 없이) */
        .ai-welcome {
            color: #fff;
        }
        .ai-welcome .welcome-title {
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 8px 0;
            line-height: 1.3;
        }
        .ai-welcome .welcome-prompt {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
            margin: 0 0 20px 0;
        }

        /* 2x2 토픽 카드 (Anxiety / Stress 스타일) */
        .topic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 8px;
        }
        .topic-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #fff;
            text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .topic-card:active {
            background: rgba(255, 255, 255, 0.1);
        }
        .topic-card .topic-icon {
            font-size: 28px;
        }
        .topic-card .topic-label {
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
        }

        /* 채팅 메시지 — 다크 버블 */
        .chat-message {
            display: flex;
            gap: 12px;
            max-width: 88%;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .chat-message.ai { align-self: flex-start; }
        .chat-message.user { align-self: flex-end; flex-direction: row-reverse; }
        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .chat-message.user .chat-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .chat-bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .chat-message.ai .chat-bubble {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top-left-radius: 6px;
        }
        .chat-message.user .chat-bubble {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.5) 0%, rgba(118, 75, 162, 0.5) 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-right-radius: 6px;
        }
        .chat-bubble strong { color: #fff; }
        .chat-bubble .pill-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        /* 하단 입력 — 이미지 스타일: pill 바 + 좌 뒤로가기 | 중 글로우 마이크 | 우 채팅 */
        .search-page .chat-input-wrapper {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 360px;
            margin: 0 16px 24px;
            margin-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            padding: 10px 10px 10px 14px;
            background: rgba(15, 20, 45, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.04), 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            z-index: 200;
        }
        .search-page .input-bar-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            flex-shrink: 0;
        }
        .search-page .input-bar-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        .search-page .input-bar-btn.back { font-size: 20px; font-weight: 300; }
        .search-page .input-bar-mic-wrap {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-page .input-bar-mic {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg,
                rgba(139, 92, 246, 0.9) 0%,
                rgba(99, 102, 241, 0.95) 25%,
                rgba(236, 72, 153, 0.5) 60%,
                rgba(251, 191, 36, 0.35) 100%);
            color: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.15),
                0 0 28px rgba(139, 92, 246, 0.5),
                0 0 48px rgba(99, 102, 241, 0.25),
                0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-page .input-bar-mic:active {
            transform: scale(0.94);
        }
        .search-page .input-bar-chat {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .search-page .input-bar-chat:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="mobile-frame search-page">
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons">
                <span class="icon">📶</span>
                <span class="icon">🔋</span>
            </div>
        </div>
        <header class="top-bar">
            <div class="header-left">
                <div class="header-info">
                    <div class="header-title-row">
                        <h2>온디바이스 AI</h2>
                        <a href="settings.html" class="icon-btn" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">⚙️</a>
                    </div>
                    <p class="subtitle">오프라인 작동 • 안전함</p>
                </div>
            </div>
        </header>
        <div class="chat-scroll">
        <main class="chat-container">
            <!-- 환영 문구 (Sample6 "Hi, I'm Aria" 스타일) -->
            <div class="ai-welcome">
                <h2 class="welcome-title">안녕하세요, 저는 AI 어시스턴트예요</h2>
                <p class="welcome-prompt">한국에서 무엇을 도와드릴까요? 아래에서 골라보거나 말씀해 주세요.</p>
                <div class="topic-grid">
                    <a href="#" class="topic-card">
                        <span class="topic-icon">📸</span>
                        <span class="topic-label">메뉴판 번역</span>
                    </a>
                    <a href="#" class="topic-card">
                        <span class="topic-icon">🍚</span>
                        <span class="topic-label">근처 맛집</span>
                    </a>
                    <a href="#" class="topic-card">
                        <span class="topic-icon">🚇</span>
                        <span class="topic-label">길찾기</span>
                    </a>
                    <a href="#" class="topic-card">
                        <span class="topic-icon">💬</span>
                        <span class="topic-label">그냥 대화하기</span>
                    </a>
                </div>
            </div>

            <!-- User Message Example -->
            <div class="chat-message user">
                <div class="chat-avatar">👤</div>
                <div class="chat-bubble">
                    여기서 경복궁까지 어떻게 가야 해?
                </div>
            </div>

            <!-- AI Response Example -->
            <div class="chat-message ai">
                <div class="chat-avatar">🤖</div>
                <div class="chat-bubble">
                    가장 빠른 방법은 <strong>지하철 3호선(주황색)</strong>을 타고 경복궁역에서 내리는 것입니다. 역까지 약 15분 정도 소요됩니다. <br><br>
                    가장 가까운 지하철 입구까지 AR(증강현실) 길 안내를 켜드릴까요?
                    <div style="margin-top: 12px;">
                        <button class="pill-btn primary" onclick="location.href='ar_guide.html'"
                            style="padding: 8px 16px; font-size: 13px;">AR 길안내 시작 🚶‍♂️</button>
                    </div>
                </div>
            </div>
        </main>
        </div>
        <div class="chat-input-wrapper">
            <button type="button" class="input-bar-btn back" aria-label="뒤로" onclick="history.back()">‹</button>
            <div class="input-bar-mic-wrap">
                <button type="button" class="input-bar-mic" aria-label="음성 입력">🎤</button>
            </div>
            <button type="button" class="input-bar-chat" aria-label="채팅">💬</button>
        </div>

        <!-- Gesture Navigation -->
        <div class="gesture-nav-container">
            <button id="gesture-fab" class="gesture-btn">
                <span style="filter: grayscale(1) brightness(2);">📷</span>
            </button>
        </div>
        <script src="gesture-nav.js"></script>
    </div>
</body>

</html>
