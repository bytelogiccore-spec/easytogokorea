<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyToGoKorea - Smart Food Menu</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="mobile-frame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons">
                <span class="icon">📶</span>
                <span class="icon">🔋</span>
            </div>
        </div>

        <div class="app-content menu-content">
            <header class="header">
                <button class="icon-btn" onclick="history.back()">←</button>
                <div class="header-center">
                    <h2 class="header-title">광장시장 박가네 빈대떡</h2>
                    <span class="subtitle"
                        style="display:block; text-align:center; font-size:12px; color: var(--accent);">Table 5</span>
                </div>
                <button class="icon-btn clear">🔤</button>
            </header>

            <div class="menu-filters"
                style="display: flex; gap: 8px; margin: 16px 24px; overflow-x: auto; padding-bottom: 8px;">
                <button class="filter-chip active">🔥 Best</button>
                <button class="filter-chip">🌱 비건 필터</button>
                <button class="filter-chip">🚫 견과류 제외</button>
            </div>

            <div class="menu-list" style="padding: 0 24px;">
                <!-- Menu Item 1 -->
                <div class="card menu-item" style="display: flex; gap: 16px; padding: 16px; margin-bottom: 16px;">
                    <div class="menu-image"
                        style="width: 80px; height: 80px; background: #e0e0e0; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 32px;">
                        🥞</div>
                    <div class="menu-info" style="flex: 1;">
                        <h3 style="font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 4px;">
                            녹두 빈대떡 <span style="font-size:20px;">🟢</span></h3>
                        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">Mung Bean Pancake.
                            바삭하게 부친 전통 고기 전</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 700; color: var(--accent);">₩ 15,000</span>
                            <div class="quantity-control"
                                style="display: flex; align-items: center; gap: 12px; background: #F5F5F7; padding: 4px 12px; border-radius: 20px;">
                                <button
                                    style="border:none; background:none; font-size:16px; font-weight:700;">-</button>
                                <span style="font-weight:600; font-size:14px;">1</span>
                                <button
                                    style="border:none; background:none; font-size:16px; font-weight:700; color:var(--accent);">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Menu Item 2 -->
                <div class="card menu-item" style="display: flex; gap: 16px; padding: 16px; margin-bottom: 16px;">
                    <div class="menu-image"
                        style="width: 80px; height: 80px; background: #e0e0e0; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 32px;">
                        🍙</div>
                    <div class="menu-info" style="flex: 1;">
                        <h3 style="font-size: 15px; margin-bottom: 4px;">마약 김밥 <span style="font-size:20px;">🔴</span>
                        </h3>
                        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">Mini Kimbap. 겨자
                            소스가 특징인 한입 김밥 (마약 성분 없음)</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 700; color: var(--accent);">₩ 6,000</span>
                            <div class="quantity-control"
                                style="display: flex; align-items: center; gap: 12px; background: #F5F5F7; padding: 4px 12px; border-radius: 20px;">
                                <button
                                    style="border:none; background:none; font-size:16px; font-weight:700; color:#ccc;">-</button>
                                <span style="font-weight:600; font-size:14px;">0</span>
                                <button
                                    style="border:none; background:none; font-size:16px; font-weight:700; color:var(--accent);">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-fixed-actions" style="display: flex; align-items: center; gap: 16px;">
                <div style="flex: 1; text-align: left;">
                    <p style="margin: 0; font-size: 12px; color: var(--text-secondary);">총 합계 (Total)</p>
                    <h3 style="margin: 0; font-size: 20px; font-weight: 800; color: var(--text-primary);">₩ 15,000</h3>
                </div>
                <button class="pill-btn primary" id="orderBtn" style="flex: 1.5; font-size:15px;">주문 및 결제하기</button>
            </div>

            <!-- Payment Dashboard Overlay -->
            <div class="overlay hidden" id="paymentPopup" style="align-items: flex-end; padding-bottom: 0;">
                <div class="card" style="width: 100%; border-radius: 30px 30px 0 0; margin: 0; padding: 32px 24px;">
                    <h2 class="tip-title text-center">결제 및 팁 (Checkout)</h2>

                    <button class="pill-btn full-width mild mt-16"
                        style="display: flex; justify-content: space-between; align-items: center;">
                        <span>🧑‍🤝‍🧑 친구와 나눠 내기 (Split Bill)</span>
                        <span
                            style="background:var(--accent); color:white; padding:4px 8px; border-radius:10px; font-size:12px;">1/2
                            진행</span>
                    </button>

                    <div class="mt-24">
                        <h4 style="font-size:14px; margin-bottom: 12px; text-align: center;">🎉 종업원에게 팁을 남겨보세요! (선택)
                        </h4>
                        <div style="display: flex; gap: 8px;">
                            <button class="pill-btn glass" style="flex: 1; padding: 12px 0;">No Tip</button>
                            <button class="pill-btn glass"
                                style="flex: 1; padding: 12px 0; border:2px solid var(--accent); color:var(--accent); background:#FFF9F7;">₩
                                1,000</button>
                            <button class="pill-btn glass" style="flex: 1; padding: 12px 0;">직접 입력</button>
                        </div>
                    </div>

                    <button class="pill-btn full-width primary mt-24" onclick="location.href='index.html'">₩ 16,000
                        Apple Pay로 결제</button>
                    <button class="text-btn full-width"
                        onclick="document.getElementById('paymentPopup').classList.add('hidden');">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('orderBtn').addEventListener('click', function () {
            document.getElementById('paymentPopup').classList.remove('hidden');
        });
    </script>
</body>

</html>
